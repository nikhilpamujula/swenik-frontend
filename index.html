async function refreshDirectModalLive() {
  if (!openCard || openCard.type !== 'direct') return;
  renderDirectModal(directLiveEntry || findOpportunity(openCard)); // show what we have immediately
  try {
    const data = await fetchLiveCoin(openCard.coin);
    const list = data.opportunities || [];
    // Prefer the exact combo (exchange + market); then same buy exchange;
    // then anything — never flash the sparse fallback over a technicality.
    const match = list.find(o => o.buyExchange === openCard.buyExchange && o.buyMarket === openCard.buyMarket)
      || list.find(o => o.buyExchange === openCard.buyExchange)
      || list[0];
    if (match) {
      directLiveEntry = match; liveBookError = null; liveFailStreak = 0;
      liveCache[`${cachePfx()}${openCard.coin}:${openCard.buyExchange}:${openCard.buyMarket}`] = match;
    }
    if (openCard) renderDirectModal(directLiveEntry || findOpportunity(openCard));
  } catch (err) {
    liveFailStreak++;
    liveBookError = err.message;
    // Keep showing the last good live books; only fall back to the sparse
    // touched-levels view if we never got a live response at all.
    if (openCard) renderDirectModal(directLiveEntry || findOpportunity(openCard));
  }
}

// Fallback order book when the live per-coin endpoint isn't reachable:
// rebuilt from the walked rows already in the list data. Only the levels
// the trade actually touched are known (level index, price, qty consumed)
// — not the full 20-level depth — so it's clearly labeled as such.
function fallbackBooksFromRows(entry) {
  const rows = entry.walked && entry.walked.rows;
  if (!rows || !rows.length) return null;
  const asks = {}, bids = {};
  for (const r of rows) {
    if (r.askLevel !== undefined) {
      const p = r.priceAsk !== undefined ? r.priceAsk : r.price;
      if (!asks[r.askLevel]) asks[r.askLevel] = { price: p, size: 0, consumedQty: 0, consumedPct: 100 };
      asks[r.askLevel].size += r.qty; asks[r.askLevel].consumedQty += r.qty;
    }
    if (r.bidLevel !== undefined && r.priceBid !== undefined) {
      if (!bids[r.bidLevel]) bids[r.bidLevel] = { price: r.priceBid, size: 0, consumedQty: 0, consumedPct: 100 };
      bids[r.bidLevel].size += r.qty; bids[r.bidLevel].consumedQty += r.qty;
    }
  }
  const toArr = m => Object.keys(m).sort((a,b)=>a-b).map(k => m[k]);
  return {
    buy:  { exchange: entry.buyExchange, market: entry.buyMarket, currency: 'INR', levels: toArr(asks) },
    sell: { exchange: entry.sellExchange, market: entry.sellMarket, currency: 'INR', levels: toArr(bids) }
  };
}

// KoinKnight-style multi-market order book for loops: one table, a column
// pair (Size|Price) per leg, asks section on top aligned so every leg's
// best ask sits adjacent to the yellow Spread row (shorter books pad at
// the top), then per-leg Spread values (best ask - best bid — computable
// now that the backend sends both sides), then bids best-first.
function loopOrderBookTable(legs, opts) {
  opts = opts || {};
  const showBars = opts.showBars !== false;   // false → plain book (arb negative)
  const levels = opts.levels || null;         // {first:{pct,inr}, second:{pct,inr}}
  // Cap at 13 levels a side — deeper reads poorly on screen (user call).
  legs = legs.map(l => ({ ...l, asks: (l.asks || []).slice(0, 13), bids: (l.bids || []).slice(0, 13) }));
  const maxAsks = Math.max(...legs.map(l => l.asks.length));
  const maxBids = Math.max(...legs.map(l => l.bids.length));

  let askRows = '';
  for (let r = 0; r < maxAsks; r++) {
    askRows += '<tr class="kk-ask-row">';
    for (const leg of legs) {
      // bottom row (r = maxAsks-1) shows each leg's BEST ask (index 0),
      // rows above walk outward into worse prices; shallow legs pad at top
      const idx = maxAsks - 1 - r;
      askRows += idx < leg.asks.length ? kkObCellPair(leg.asks[idx], '--danger', leg.currency, showBars) : '<td></td><td></td>';
    }
    askRows += '</tr>';
  }

  let spreadRow = '<tr class="kk-spread-row">';
  for (const leg of legs) {
    const bestAsk = leg.asks[0], bestBid = leg.bids[0];
    const spread = (bestAsk && bestBid) ? (bestAsk.price - bestBid.price) : null;
    spreadRow += `<td class="kk-spread-label">Spread</td><td class="ob-price-cell">${spread !== null ? fmtAdaptive(spread) : '—'}</td>`;
  }
  spreadRow += '</tr>';

  let bidRows = '';
  for (let r = 0; r < maxBids; r++) {
    bidRows += '<tr class="kk-bid-row">';
    for (const leg of legs) {
      bidRows += leg.bids[r] ? kkObCellPair(leg.bids[r], '--success', leg.currency, showBars) : '<td></td><td></td>';
    }
    bidRows += '</tr>';
  }

  const headGroups = legs.map(l => `<th colspan="2" class="ob-group">${exLabel(l.exchange)}<div class="ob-sub">${l.market}</div></th>`).join('');
  const headCols = legs.map(() => '<th class="ob-size-cell">Size</th><th class="ob-price-cell">Price</th>').join('');

  // 1st/2nd Level Arb banner (4-leg loop books only). The arb % for each half
  // now lives HERE, right above its columns — instead of at the top of the
  // modal — so you can read it against the book it belongs to.
  const arbCell = (label, x) => {
    if (!x || !isFinite(x.pct)) return label;
    const color = x.pct < 0 ? 'var(--danger)' : 'var(--success)';
    const inr = (x.inr != null && isFinite(x.inr)) ? ` (${fmtInr(x.inr, 2)})` : '';
    return `${label} <span style="color:${color}; font-weight:700;">${x.pct.toFixed(2)}%${inr}</span>`;
  };
  const levelBanner = legs.length >= 4
    ? `<tr><th class="ob-group" colspan="${legs.length}">${levels ? arbCell('1st Level Arb', levels.first) : '1st Level Arb'}</th><th class="ob-group" colspan="${legs.length}">${levels ? arbCell('2nd Level Arb', levels.second) : '2nd Level Arb'}</th></tr>`
    : '';
  return `
    <div class="loop-scroll">
    <table class="ob-table dual" style="min-width:${legs.length * 150}px;">
      <thead>
        ${levelBanner}
        <tr>${headGroups}</tr>
        <tr>${headCols}</tr>
      </thead>
      <tbody>${askRows}${spreadRow}${bidRows}</tbody>
    </table>
    </div>`;
}

// Shared builders so the periodic refresh can update just the numbers + order
// book IN PLACE (see updateLoopModalLive) instead of tearing down and rebuilding
// the whole modal, which flickered and reset scroll / open <details> every cycle.
function loopTouchedRows(label, arr, unit) {
  return (arr && arr.length) ? arr.map(t =>
    `<div class="leg-line"><span class="k">${label} — level ${t.level}</span><span class="v">${fmtCoin(t.qty,2)} ${unit} @ ${fmtNum(t.price,6)} (${t.pct.toFixed(1)}% of level)</span></div>`
  ).join('') : `<div class="leg-line"><span class="k">—</span><span class="v">no levels touched</span></div>`;
}

function loopRateNoteHtml(entry) {
  const c1 = entry.coin1.toUpperCase(), c2 = entry.coin2.toUpperCase();
  const u = entry.usdtInrUsed || {};
  // Support both shapes: {rate,source} (build 45+) and a bare number (older).
  const rateVal = x => (x && typeof x === 'object') ? x.rate : x;
  const rateSrc = x => (x && typeof x === 'object' && x.source) ? x.source : null;
  const srcTag = x => { const s = rateSrc(x); return s ? ` <span style="opacity:.7;">(${s === 'wazirx' ? 'WazirX book' : s})</span>` : ''; };
  const vn = cardVenueName();
  const rateBits = [];
  if (u.entry != null) rateBits.push(`buying ${c1} via ${vn} ${c1}/USDT → USDT/INR <b>₹${fmtNum(rateVal(u.entry), 2)}</b>${srcTag(u.entry)}`);
  if (u.exit != null)  rateBits.push(`selling ${c2} via ${vn} ${c2}/USDT → USDT/INR <b>₹${fmtNum(rateVal(u.exit), 2)}</b>${srcTag(u.exit)}`);
  return rateBits.length
    ? `<div style="margin-top:10px; padding:9px 12px; background:#eef6ff; border:1px solid #cfe3f7; border-radius:8px; font-size:12.5px; color:#345;">
         <b>${vn} USDT/INR used:</b> ${rateBits.join(' &nbsp;·&nbsp; ')}
       </div>`
    : '';
}

function loopObSectionHtml(entry) {
  if (entry.liveBooks && entry.liveBooks.legs) {
    // Overall arb negative → the trade has slipped/been taken; drop the
    // red/green "% consumed" bars and their legend (they imply a live trade
    // that no longer exists) and just show the plain book.
    const overall = entry.walked ? entry.walked.profit
                   : (entry.roughPct != null ? entry.roughPct : null);
    const negative = overall != null && overall < 0;
    const showBars = !negative;
    const header = showBars
      ? `<div class="ob-legend" style="margin-top:14px;">
           <div class="ob-legend-item"><span class="ob-swatch" style="background:var(--ask-bg); border:1px solid #f4c2c2;"></span><span class="ob-bar-icon" style="background:var(--danger);"></span>Asks — % consumed by this loop</div>
           <div class="ob-legend-item"><span class="ob-swatch" style="background:var(--bid-bg); border:1px solid #b7e6da;"></span><span class="ob-bar-icon" style="background:var(--success);"></span>Bids — % consumed by this loop</div>
         </div>`
      : `<div class="note-box" style="margin-top:14px;">Overall arbitrage is negative right now — the trade has slipped, so the plain order book is shown (no consumption bars).</div>`;
    return `${header}
         <div class="ob-section-title">Order Book <span style="font-weight:500; font-size:11px; color:var(--gray-500);">· live · updates every 5s</span></div>
         ${loopOrderBookTable(entry.liveBooks.legs, { showBars, levels: entry.levels })}`;
  }
  return loopLiveError
    ? `<div class="banner-error">Order book depth unavailable (${loopLiveError}). If the backend hasn't been redeployed with the loop live endpoint yet, deploy the updated server.js and src/compute.js first — depth appears automatically once it's live.</div>`
    : `<div class="modal-note">Loading order book depth…</div>`;
}

function renderLoopModal() {
  const entry = loopLiveEntry || findOpportunity(openCard);

    document.getElementById('modalBody').innerHTML = loopLiveError
      ? `<div class="banner-error">Couldn't load this loop (${loopLiveError}). Retrying every 5s.</div>`
      : `<div class="modal-note">Loading…</div>`;
    return;
  }
  const c1 = entry.coin1.toUpperCase(), c2 = entry.coin2.toUpperCase();
  document.getElementById('modalTitle').textContent = `${c1} → ${c2} — Loop Arbitrage`;

  if (!withVolume || !entry.walked) {
    const legsEarly = entry.liveBooks && entry.liveBooks.legs;
    // The live loop object (from the loop /live endpoint) carries `walked`

    // Use whichever spread number is present so this never crashes.

// Request 4: refresh ONLY the numbers, level split, leg tables and order book
// in place, so the modal never fully redraws while open (no flicker, no scroll
// jump, open <details> stay open). Falls back to a full render if the expected
// volume-ON structure isn't there yet (e.g. volume was OFF, walk just arrived).
function updateLoopModalLive(entry) {
  const slot = document.getElementById('loopObSlot');
  const sumP = document.getElementById('loopSumProfit');
  if (!slot || !sumP || !withVolume || !entry.walked) { renderLoopModal(); return; }
  const c1 = entry.coin1.toUpperCase(), c2 = entry.coin2.toUpperCase();
  const l = entry.walked;
  sumP.textContent = fmtInr(l.profit,2);
  const roi = document.getElementById('loopSumRoi'); if (roi) roi.textContent = l.profitPct.toFixed(2) + '%';
  const ex  = document.getElementById('loopSumExec'); if (ex) ex.textContent = entry.executionMin.toFixed(2) + ' min';
  const rn  = document.getElementById('loopRateNote'); if (rn) rn.innerHTML = loopRateNoteHtml(entry);
  const b1  = document.getElementById('loopLeg1Body'); if (b1) b1.innerHTML = loopTouchedRows(`Sell ${c1}`, l.sellTRBTouched, c1);
  const b2  = document.getElementById('loopLeg2Body'); if (b2) b2.innerHTML = loopTouchedRows(`Buy ${c2}`, l.buyGALATouched, c2);
  const b3  = document.getElementById('loopLeg3Body'); if (b3) b3.innerHTML = loopTouchedRows(`Sell ${c2}`, l.sellGALATouched, c2);
  const fb  = document.getElementById('loopFeeBody'); if (fb) fb.innerHTML = loopFeeBodyHtml(l, c1, c2, entry);
  slot.innerHTML = loopObSectionHtml(entry);
}

let loopLiveEntry = null;   // last successful response from the loop live endpoint
let loopLiveError = null;

async function fetchLoopLive(coin1, coin2, entryVenue, exitVenue) {
  const qs = new URLSearchParams();
  if (entryVenue) qs.set('entry', entryVenue);
  if (exitVenue) qs.set('exit', exitVenue);
  const q = qs.toString();
  const loopPath = (openCard && openCard.venueApi)
    ? `${openCard.venueApi}/loop/${coin1}/${coin2}/live`
    : `/api/opportunities/loop/${coin1}/${coin2}/live`;
  const res = await fetch(`${API_BASE}${loopPath}${q ? '?' + q : ''}`);
  if (!res.ok) {
    let reason = `API returned ${res.status}`;
    try { const body = await res.json(); if (body.error) reason = body.error; } catch (e) {}
    throw new Error(reason);
  }
  return res.json();
}

async function refreshLoopModalLive() {
  if (!openCard || openCard.type !== 'loop') return;
  if (!document.getElementById('loopObSlot')) renderLoopModal(); // first paint builds the shell
  try {
    const data = await fetchLoopLive(openCard.coin1, openCard.coin2, openCard.entryVenue, openCard.exitVenue);
    loopLiveEntry = data.opportunity;
    loopLiveError = null;
    liveCache[`${cachePfx()}loop:${openCard.coin1}:${openCard.coin2}:${openCard.entryVenue}:${openCard.exitVenue}`] = data.opportunity;
  } catch (err) {
    loopLiveError = err.message;
    // keep the last good entry so the book doesn't vanish on a transient failure
  }
  if (!openCard || openCard.type !== 'loop') return;
  const entry = loopLiveEntry || findOpportunity(openCard);
  if (entry && document.getElementById('loopObSlot')) updateLoopModalLive(entry);
  else renderLoopModal();
}

// ================================================================
// RENDER — INTRA LOOP modal (WazirX triangle, top-of-book)
// ================================================================
let intraLoopLiveEntry = null;
let intraLoopLiveError = null;

async function fetchIntraLoopLive(coin) {
  const intraPath = (openCard && openCard.venueApi)
    ? `${openCard.venueApi}/intraloop/${coin}/live`
    : `/api/opportunities/intraloop/${coin}/live`;
  const res = await fetch(`${API_BASE}${intraPath}`);
  if (!res.ok) {
    let reason = `API returned ${res.status}`;
    try { const body = await res.json(); if (body.error) reason = body.error; } catch (e) {}
    throw new Error(reason);
  }
  return res.json();
}

function renderIntraLoopModal() {
  const coin = (openCard.coin || '').toUpperCase();
  document.getElementById('modalTitle').textContent = `${coin} — Intra Loop (${cardVenueName()} triangle)`;
  document.getElementById('modalStatus').innerHTML = `refreshes every 15s while open · <a href="#" onclick="refreshIntraLoopModalLive(); return false;" style="color:var(--accent);">refresh now</a>`;
  const entry = intraLoopLiveEntry;
  if (!entry) {
    document.getElementById('modalBody').innerHTML = intraLoopLiveError
      ? `<div class="banner-error">Couldn't load this triangle (${intraLoopLiveError}). Retrying every 15s.</div>`
      : `<div class="modal-note">Loading…</div>`;
    return;
  }
  const opps = entry.opportunities || [];
  const legs = entry.liveBooks && entry.liveBooks.legs;
  // Same rule as Loop: if no triangle direction is positive, the trade has
  // slipped — show the plain book without the red/green consumption bars.
  const intraShowBars = opps.some(op => (op.walked ? op.walked.profit : op.roughPct) > 0);
  const pathHtml = opps.length ? opps.map(op => {
    const l = op.walked;
    const p = l ? l.profitPct : op.roughPct;
    return `<div class="profit-box ${(p ?? 0) < 0 ? 'negative' : ''}" style="flex-direction:column; align-items:flex-start; gap:2px;">
      <div class="profit-pct">${p != null ? p.toFixed(2) + '%' : '—'}${l ? ` (${fmtInr(l.profit,2)})` : ''}</div>
      <div class="profit-sub">${op.pathLabel || ''}${l ? ` · max ${fmtCoin(l.qty,2)} ${coin} at top-of-book` : ''}</div>
    </div>`;
  }).join('') : `<div class="modal-note">No computable triangle right now (thin ${cardVenueName()} book).</div>`;
  document.getElementById('modalBody').innerHTML = `
    <div class="note-box">Same-exchange ${cardVenueName()} triangle — top-of-book, instant, no transfers. The three books below are the markets it routes through.</div>
    ${pathHtml}
    ${legs ? `${intraShowBars
         ? `<div class="ob-legend" style="margin-top:14px;">
         <div class="ob-legend-item"><span class="ob-swatch" style="background:var(--ask-bg); border:1px solid #f4c2c2;"></span><span class="ob-bar-icon" style="background:var(--danger);"></span>Asks — % consumed by this loop</div>
         <div class="ob-legend-item"><span class="ob-swatch" style="background:var(--bid-bg); border:1px solid #b7e6da;"></span><span class="ob-bar-icon" style="background:var(--success);"></span>Bids — % consumed by this loop</div>
       </div>`
         : `<div class="note-box" style="margin-top:14px;">Triangle is negative right now — showing the plain order book (no consumption bars).</div>`}
       <div class="ob-section-title">Order Book</div>${loopOrderBookTable(legs, { showBars: intraShowBars })}` : '<div class="modal-note">Loading order book depth…</div>'}
  `;
}

async function refreshIntraLoopModalLive() {
  if (!openCard || openCard.type !== 'intraloop') return;
  renderIntraLoopModal(); // show what we have immediately
  try {
    const data = await fetchIntraLoopLive(openCard.coin);
    intraLoopLiveEntry = data.view;
    intraLoopLiveError = null;
    liveCache[`${cachePfx()}intraloop:${openCard.coin}`] = data.view;
  } catch (err) {
    intraLoopLiveError = err.message;
    intraLoopLiveEntry = null;
  }
  if (openCard) renderIntraLoopModal();
}

function parseCoinList(v) {
  return String(v || '').split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
}

async function saveGiottusAlert() {
  const name = document.getElementById('gafName').value.trim();
  if (!name) { document.getElementById('gafError').textContent = 'Alert name is required.'; return; }
  const minProfit = parseFloat(document.getElementById('gafMinProfit').value);
  if (isNaN(minProfit)) { document.getElementById('gafError').textContent = 'Min profit ₹ must be a number.'; return; }
  const minPctRaw = document.getElementById('gafMinPct').value.trim();
  const minPct = minPctRaw === '' ? null : parseFloat(minPctRaw);
  const enabledEl = document.getElementById('gafEnabled');
  const body = {
    name, type: 'arbitrage', kind: 'giottus', direction: null, wallets: 'any',
    frequency: document.querySelector('input[name=gafFreq]:checked').value,
    coin: null,
    cooldown_min: parseInt(document.getElementById('gafCooldown').value) || 30,
    threshold_inr: minProfit,
    threshold_pct: (minPct != null && !isNaN(minPct)) ? minPct : null,
    enabled: enabledEl ? enabledEl.checked : true,
    config: {
      routeKind: document.querySelector('input[name=gafKind]:checked').value,
      persistChecks: parseInt(document.getElementById('gafPersist').value) || 2,
      maxPerHour: parseInt(document.getElementById('gafMaxHour').value) || 6,
      coins: parseCoinList(document.getElementById('gafCoins').value),
      excludeCoins: parseCoinList(document.getElementById('gafExclude').value)
    }
  };
  try {
    const url = editingAlert ? `${API_BASE}/api/alerts/${editingAlert.id}` : `${API_BASE}/api/alerts`;

// Single-market two-sided table: asks (worst→best) on top, real spread row,
// bids (best→worst) below — the per-market view from KoinKnight's
// Orderbook page.
function singleMarketBookTable(b) {
  b = { ...b, asks: (b.asks || []).slice(0, 13), bids: (b.bids || []).slice(0, 13) };
  const askRows = [...b.asks].reverse().map(l => `<tr class="kk-ask-row">${kkObCellPair(l, '--danger', b.currency)}</tr>`).join('');
  const bidRows = b.bids.map(l => `<tr class="kk-bid-row">${kkObCellPair(l, '--success', b.currency)}</tr>`).join('');
  const spread = (b.asks[0] && b.bids[0]) ? fmtAdaptive(b.asks[0].price - b.bids[0].price) : '—';
  return `
    <table class="ob-table">
      <thead><tr><th>Size</th><th>Price (${b.currency})</th></tr></thead>
      <tbody>
        ${askRows}
        <tr class="kk-spread-row"><td class="kk-spread-label">Spread</td><td>${spread}</td></tr>
        ${bidRows}
      </tbody>
    </table>`;
}

function renderOrderbookPage() {
  const el = document.getElementById('cardList');
  if (!obSelections.length) {

// ================================================================
// TOP-LEVEL REFRESH / INTERACTION
// ================================================================
function setBanner(msg) {
  document.getElementById('bannerSlot').innerHTML = msg ? `<div class="banner-error">${msg}</div>` : '';
}

let refreshInFlight = false;
// Shows "Refreshing…" while a fetch is in flight, otherwise the countdown —
// so on a slow connection the header reflects what's actually happening
// instead of sitting frozen at "in 0s".
function updateRefreshStatus() {
  const el = document.getElementById('nextRefresh');
  if (!el) return;
  el.textContent = refreshInFlight ? 'Refreshing…' : `Next auto-refresh in ${countdown}s`;
}

async function fullRefresh() {
  // Don't stack requests: on a slow network a fetch can take longer than the
  // 10s auto-refresh interval. Without this guard the requests pile up and
  // choke each other — the #1 cause of the "everything lags" feeling.
  if (refreshInFlight) return;
  refreshInFlight = true;
  updateRefreshStatus();
  let ok = true, errMsg = null;
  const fetchedVol = withVolume; // remember which volume this fetch is for
  try {
    const data = await fetchOpportunities(fetchedVol);
    usingSeedData = false;
    // If the user flipped volume WHILE this was in flight, don't clobber the
    // (already instant-repainted) new view with the old volume's data — show
    // the current volume's cached snapshot instead.
    if (String(fetchedVol) === String(withVolume)) {
      allOpportunities = data.opportunities;
      lastFetchTs = data.ts;
    } else if (volSnapCache[String(withVolume)]) {
      allOpportunities = volSnapCache[String(withVolume)].opportunities;
      lastFetchTs = volSnapCache[String(withVolume)].ts;
    }
  } catch (err) {
    ok = false;
    errMsg = err.message;
  } finally {
    refreshInFlight = false;
  }
  hasLoadedOnce = true;

  setBanner(ok ? null : (usingSeedData
    ? `Couldn't reach the scanner (${errMsg}). Showing a saved snapshot — prices and profits are NOT live.`
    : `Couldn't reach the scanner (${errMsg}).${allOpportunities.length ? ' Showing the last data we have.' : ''}`));

  // Keep the sidebar highlight and active page in sync so a manual refresh
  // never bounces the user off Loop/Intra Loop back to Direct.
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = PAGES[currentPage] && document.getElementById(PAGES[currentPage].navId);
  if (navEl) navEl.classList.add('active');
  // NOTE: we deliberately do NOT rebuild the toolbar here. It was being torn
  // down and recreated every 10s, which made the toggles/sort controls flicker
  // and could swallow a tap that landed right as the refresh fired. The toolbar
  // only depends on user choices (filters/toggles), not on fetched data, so it
  // never needs rebuilding on a data refresh — pages with live counts
  // (Giottus/CoinSwitch) refresh their own toolbars.
  renderCards();
  // WazirX (native venue) shows live sub-tab counts in its toolbar, so refresh
  // it here — the same cadence the external venues use for their toolbars.
  if (venueCfg() && venueCfg().native) renderToolbar();
  document.getElementById('lastRefreshed').innerHTML = lastFetchTs
    ? `Last refreshed: <strong>${fmtTime(new Date(lastFetchTs))}</strong>` : 'Last refreshed: —';
  countdown = 10;
  updateRefreshStatus();
  if (openCard && openCard.type === 'loop') {
    // Keep the open Track Live modal in place — don't full-redraw it here (the
    // modal has its own 5s live poll); just refresh its numbers + book.
    const e = loopLiveEntry || findOpportunity(openCard);
    if (e && document.getElementById('loopObSlot')) updateLoopModalLive(e);
    else renderLoopModal();
  }
  if (openCard && openCard.type === 'intraloop') renderIntraLoopModal();
  // Render the open book from the last-good LIVE entry (which holds the full
  // two-sided book), NOT the list entry — the list entry has no order book, so
  // rendering it here made the open Track Live book collapse to the sparse
  // "Connecting…" fallback every 10s and then repopulate (the "vanishing").
  if (openCard && openCard.type === 'direct') renderDirectModal(directLiveEntry || findOpportunity(openCard));
}

function manualRefresh() {
  const now = Date.now();
  if (now - lastManualRefreshAt < 2000) return; // rate-limited to once per 2s
  lastManualRefreshAt = now;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  fullRefresh();
  setTimeout(() => { btn.disabled = false; }, 2000);
}

// Info banner intentionally left blank (removed by request to reclaim top space).
// The #noteBox element stays in the DOM for the show/hide logic; an empty
// note-box collapses to zero height via the `.note-box:empty` CSS rule.
document.getElementById('noteBox').innerHTML = '';

// Pull-to-refresh: on touch devices, dragging down >70px from the very top
// of the page triggers the same refresh as the ↻ button (rate-limited the
// same way).
let ptrStartY = null;
document.addEventListener('touchstart', e => {
  ptrStartY = (window.scrollY === 0) ? e.touches[0].clientY : null;
}, { passive: true });
document.addEventListener('touchmove', e => {

// PWA disabled: actively unregister any previously-installed service worker

// devices, so deploys appeared "not to land" (fixes present in the code but
// not visible). This guarantees every visit loads the freshly deployed file.

    .then(rs => rs.forEach(r => r.unregister())).catch(() => {});

// ================================================================
// GIOTTUS page — self-contained intra-exchange route scanner.
// Data comes from /api/giottus/* (Vercel serverless proxies living in
// the same frontend repo) — the Swenik backend is NOT involved at all.
// Pipeline: 1 ticker call screens every route (triangles + cross-pair,
// USDT & BTC bridges, fees included) → routes above the threshold get
// real order-book depth (a few per cycle, spaced, cached, auto-backoff)
// → each is walked to its MAX profitable size, force-sized up to
// Giottus's minimum order values when needed → only routes clearing the
// minimum profit survive, best rupee-profit first.
// ================================================================
let gTimer = null, gTab = 'intra', gSettingsOpen = false;
let gBookTimer = null; // 5s refresh for any OPEN Giottus order book (book only, not the page)
let gSettings = { feeInr: 0.4, feeUsdt: 0.3, thr: 1.0, minP: 100, minInr: 1000, minUsdt: 10, topK: 15 };
let gTicker = null, gLastRoutes = null, gCandidates = [], gMkts = 0, gUiRate = '—';
const gDepth = {}, gChecked = new Map(), gOpenBooks = new Set();
let gRlHits = 0, gCalls = 0, gBackoffUntil = 0, gBackoffMs = 15000, gLastTs = '—', gErr = null, gRefreshing = false;
let gServerSnap = null; // /api/giottus/snapshot — what the 24/7 alert engine sees
const G_TTL = 5 * 60 * 1000, G_PER_CYCLE = 8, G_SPACING = 300;
// Cross routes pair only the TOP-K triangles per direction (gSettings.topK,
// default 15): the out-triangle ranking and the out-half ranking are the same
// order (each triangle = its half × the same usdtinr constant), so the best
// cross pairings are guaranteed to come from the top triangles of each side.
const G_SPIKE_PCT = 0.35;    // re-verify immediately if a route's screen % rises this much past its verdict
// A verdict is trusted only while (a) it's within the TTL AND (b) the route's
// live screen % hasn't spiked past what it was when the verdict was recorded —
// a stale "worthless" verdict must not hide a route that just turned juicy.
const gFreshCheck = (e, curPct) => e && (Date.now() - e.ts) < G_TTL
  && !(curPct !== undefined && isFinite(e.scrPct) && curPct - e.scrPct > G_SPIKE_PCT);
const gLv = raw => (raw || []).map(([p, q]) => ({ p: parseFloat(p), q: parseFloat(q) })).filter(l => l.p > 0 && l.q > 0);
const gInrFmt = n => '₹' + Math.round(n).toLocaleString('en-IN');
const gInTab = r => gTab === 'intra' ? r.legsSpec.length === 3 : r.legsSpec.length === 4;

function gWalk(legs, { stopWhenUnprofitable = true, targetIn = Infinity } = {}) {
  const idx = legs.map(() => 0);
  const rem = legs.map(l => (l.levels[0] ? l.levels[0].q : 0));
  const used = legs.map(l => l.levels.map(() => 0));
  const notion = legs.map(() => 0);
  let inrIn = 0, inrOut = 0, guard = 0, bookEnded = false;
  while (guard++ < 4000 && inrIn < targetIn - 1e-9) {
    let ratio = 1;
    const factorTo = [1];
    for (let j = 0; j < legs.length; j++) {
      const L = legs[j], lv = L.levels[idx[j]];
      if (!lv || rem[j] <= 1e-12) { ratio = -1; break; }
      ratio *= L.side === 'buy' ? 1 / (lv.p * (1 + L.fee)) : lv.p * (1 - L.fee);
      factorTo.push(ratio);
    }
    if (ratio === -1) { bookEnded = true; break; }
    if (stopWhenUnprofitable && ratio <= 1) break;
    let slice = targetIn - inrIn;
    for (let j = 0; j < legs.length; j++) {
      const limitFlow = legs[j].side === 'buy' ? factorTo[j + 1] : factorTo[j];
      if (limitFlow > 0) slice = Math.min(slice, rem[j] / limitFlow);
    }
    if (!isFinite(slice) || slice <= 1e-9) break;
    inrIn += slice; inrOut += slice * ratio;
    for (let j = 0; j < legs.length; j++) {
      const L = legs[j];
      const limitFlow = L.side === 'buy' ? factorTo[j + 1] : factorTo[j];
      rem[j] -= slice * limitFlow; used[j][idx[j]] += slice * limitFlow;
      notion[j] += L.side === 'buy' ? slice * factorTo[j] / (1 + L.fee) : slice * factorTo[j + 1] / (1 - L.fee);
      if (rem[j] <= 1e-9) { idx[j]++; rem[j] = L.levels[idx[j]] ? L.levels[idx[j]].q : 0; }
    }
  }
  if (inrIn <= 0) return null;
  const complete = !isFinite(targetIn) || inrIn >= targetIn - 1e-6 || !bookEnded;
  return { inrIn, inrOut, profit: inrOut - inrIn, pct: (inrOut / inrIn - 1) * 100, used, notion, complete };
}

function gVerdict(legs, legsSpec, mins) {
  const minFor = q => q === 'inr' ? mins.inr : q === 'usdt' ? mins.usdt : mins.btc;
  const meets = w => w && w.notion.every((n, j) => n + 1e-6 >= minFor(legsSpec[j].quote));
  const w = gWalk(legs);
  if (meets(w)) return { walk: w, forced: false };
  let ratio = 1; const factorTo = [1];
  for (const L of legs) {
    const lv = L.levels[0];
    if (!lv) return { walk: 'none', forced: false };
    ratio *= L.side === 'buy' ? 1 / (lv.p * (1 + L.fee)) : lv.p * (1 - L.fee);
    factorTo.push(ratio);
  }
  let S = 0;
  for (let j = 0; j < legs.length; j++) {
    const m = minFor(legsSpec[j].quote);
    if (!m) continue;
    const flow = legs[j].side === 'buy' ? factorTo[j] / (1 + legs[j].fee) : factorTo[j + 1] / (1 - legs[j].fee);
    if (flow > 0) S = Math.max(S, m / flow);
  }
  if (!isFinite(S) || S <= 0) return { walk: 'none', forced: false };
  for (let iter = 0; iter < 4; iter++) {
    const f = gWalk(legs, { stopWhenUnprofitable: false, targetIn: S * 1.001 });
    if (!f || !f.complete) return { walk: 'none', forced: true };
    if (meets(f)) return { walk: f, forced: true };
    let bump = 1;
    for (let j = 0; j < legs.length; j++) {
      const m = minFor(legsSpec[j].quote);
      if (m && f.notion[j] < m) bump = Math.max(bump, m / f.notion[j]);
    }
    S *= bump * 1.02;
  }
  return { walk: 'none', forced: true };
}

let gBadMkts = []; // markets with a crossed/glitched ticker (bid ≥ ask) — untrustworthy, skipped
function gMaps() {
  const maps = { inr: new Map(), usdt: new Map(), btc: new Map() };
  gMkts = 0; gBadMkts = [];
  for (const [sym, t] of Object.entries(gTicker || {})) {
    if (!t || !t.base_unit || !t.quote_unit) continue;
    gMkts++;
    const coin = String(t.base_unit).toLowerCase(), quote = String(t.quote_unit).toLowerCase();
    if (!maps[quote]) continue;
    const ask = parseFloat(t.sell), bid = parseFloat(t.buy);
    // Glitch guard: a NEGATIVE spread (bid strictly above ask) is a data
    // error, not free money — routes built on it are fake arbitrage. Zero
    // spread (bid == ask, a briefly locked market) is legitimate and kept.
    // No memory here: this re-evaluates from the live ticker every cycle,
    // so a market returns automatically the moment its glitch clears.
    if (isFinite(ask) && ask > 0 && isFinite(bid) && bid > 0 && bid > ask) { gBadMkts.push(sym.toLowerCase()); continue; }
    maps[quote].set(coin, { sym: sym.toLowerCase(), ask: isFinite(ask) && ask > 0 ? ask : null, bid: isFinite(bid) && bid > 0 ? bid : null });
  }
  const ui = maps.inr.get('usdt');
  gUiRate = ui && ui.bid ? `${ui.bid} / ${ui.ask}` : '—';
  return maps;
}

function gScreen(maps) {
  const IF = gSettings.feeInr / 100, BF = gSettings.feeUsdt / 100;
  const routes = [];
  gExclHalves = [];
  for (const bridge of ['usdt', 'btc']) {
    const bmap = maps[bridge], bInr = maps.inr.get(bridge);
    if (!bmap || !bmap.size) continue;
    const elig = [];
    for (const [coin, ci] of maps.inr) {
      // Only skip the bridge coin itself (that would be a degenerate INR→X→X→INR).
      // BTC and USDT ARE valid traded coins on the OTHER bridge — e.g. via the
      // USDT bridge, INR→BTC→USDT→INR (buy BTC/INR, sell BTC/USDT, sell USDT/INR)
      // is a real triangle. Blanket-excluding btc/usdt here hid those entirely.
      if (coin === bridge) continue;
      const cb = bmap.get(coin);
      if (cb) elig.push({ coin, ci, cb });
    }
    const BU = bridge.toUpperCase();
    if (bInr && bInr.ask && bInr.bid) {
      for (const { coin, ci, cb } of elig) {
        const C = coin.toUpperCase();
        // Triangles get the same viability gate as cross halves: a coin whose
        // books can't hold the exchange minimum (e.g. STO's empty INR bids)
        // is excluded until a 5-min re-probe shows liquidity returned.
        const okOut = gHalfViable({ coin, ci, cb }, true, bridge), okRet = gHalfViable({ coin, ci, cb }, false, bridge);
        if ((ci.ask && cb.bid && !okOut) || (ci.bid && cb.ask && !okRet)) gExclHalves.push({ coin: C, side: 'triangle' });
        if (okOut && ci.ask && cb.bid) routes.push({ label: `INR → ${C} → ${BU} → INR`,
          pct: (1 / (ci.ask * (1 + IF))) * (cb.bid * (1 - BF)) * (bInr.bid * (1 - IF)) * 100 - 100,
          legsSpec: [ { side:'buy', market: ci.sym, fee: IF, quote:'inr', label:`Buy ${C} · ${ci.sym}` },
                      { side:'sell', market: cb.sym, fee: BF, quote:bridge, label:`Sell ${C} · ${cb.sym}` },
                      { side:'sell', market: bInr.sym, fee: IF, quote:'inr', label:`Sell ${BU} · ${bInr.sym}` } ] });
        if (okRet && ci.bid && cb.ask) routes.push({ label: `INR → ${BU} → ${C} → INR`,
          pct: (1 / (bInr.ask * (1 + IF))) * (1 / (cb.ask * (1 + BF))) * (ci.bid * (1 - IF)) * 100 - 100,
          legsSpec: [ { side:'buy', market: bInr.sym, fee: IF, quote:'inr', label:`Buy ${BU} · ${bInr.sym}` },
                      { side:'buy', market: cb.sym, fee: BF, quote:bridge, label:`Buy ${C} · ${cb.sym}` },
                      { side:'sell', market: ci.sym, fee: IF, quote:'inr', label:`Sell ${C} · ${ci.sym}` } ] });
      }
    }
    // Cross-pair routes by HALF-DECOMPOSITION instead of brute force.
    // A cross route's profit = (out-half: INR → coinA → bridge) ×
    // (return-half: bridge → coinB → INR), and the halves are independent
    // (no shared books). So rank every out-half and every return-half from
    // the ticker, then pair only the TOP K of each — that tiny set is
    // mathematically guaranteed to contain the best possible combination,
    // instead of queueing thousands of near-clones of one dislocated leg.
    const outs = [], rets = [];
    for (const A of elig) {
      if (A.ci.ask && A.cb.bid) outs.push({ ...A, rate: (1 / (A.ci.ask * (1 + IF))) * (A.cb.bid * (1 - BF)) });
      if (A.cb.ask && A.ci.bid) rets.push({ ...A, rate: (A.ci.bid * (1 - IF)) / (A.cb.ask * (1 + BF)) });
    }
    outs.sort((a, b) => b.rate - a.rate);
    rets.sort((a, b) => b.rate - a.rate);
    // Take the top-K VIABLE halves per side: walk the ranking and skip any
    // half whose cached books can't hold the exchange minimums (recording it
    // for display) — so a great-rate/empty-book half like STO stops
    // monopolising every pairing and the next real half takes its slot.
    const K = Math.max(2, Math.min(40, Math.round(gSettings.topK) || 15));
    const takeViable = (list, isOut) => {
      const kept = [];
      for (const h of list) {
        if (kept.length >= K) break;
        if (gHalfViable(h, isOut, bridge)) kept.push(h);
        else gExclHalves.push({ coin: h.coin.toUpperCase(), side: (isOut ? 'out via ' : 'return via ') + BU });
      }
      return kept;
    };
    const outsV = takeViable(outs, true), retsV = takeViable(rets, false);
    // Triangle-equivalent numbers for the derivation display: what each half
    // would earn AS its own triangle (paying the usdtinr toll), and how much
    // of that toll clubbing the two halves recovers.
    const sBid = (bInr && bInr.bid) ? bInr.bid * (1 - IF) : null;              // sell USDT → INR (out-triangle's last leg)
    const bBuy = (bInr && bInr.ask) ? 1 / (bInr.ask * (1 + IF)) : null;        // INR → buy USDT (return-triangle's first leg)
    const spreadPct = (sBid && bBuy) ? (1 / (sBid * bBuy) - 1) * 100 : null;   // usdtinr toll recovered by clubbing
    for (const A of outsV) {
      for (const B of retsV) {
        if (A.coin === B.coin) continue;
        const pct = A.rate * B.rate * 100 - 100;
        const CA = A.coin.toUpperCase(), CB = B.coin.toUpperCase();
        routes.push({ label: `INR → ${CA} → ${BU} → ${CB} → INR`, pct,
          deriv: (sBid && bBuy) ? { outCoin: CA, retCoin: CB,
            outTri: (A.rate * sBid - 1) * 100, retTri: (bBuy * B.rate - 1) * 100, spread: spreadPct } : null,
          legsSpec: [ { side:'buy', market: A.ci.sym, fee: IF, quote:'inr', label:`Buy ${CA} · ${A.ci.sym}` },
                      { side:'sell', market: A.cb.sym, fee: BF, quote:bridge, label:`Sell ${CA} · ${A.cb.sym}` },
                      { side:'buy', market: B.cb.sym, fee: BF, quote:bridge, label:`Buy ${CB} · ${B.cb.sym}` },
                      { side:'sell', market: B.ci.sym, fee: IF, quote:'inr', label:`Sell ${CB} · ${B.ci.sym}` } ] });
      }
    }
  }
  routes.sort((a, b) => b.pct - a.pct);
  return routes;
}

// ---- half viability: learn from cached depth ----
// A half whose books can't even hold the exchange minimum order (e.g. STO's
// entire INR bid side being ~₹65 against a ₹1,000 minimum) is DISQUALIFIED
// from the top-K ranking, so it stops monopolising every cross pairing and
// the next viable half rotates in. Only books fresher than the TTL can
// disqualify — after that the half re-enters for one re-probe (self-healing
// if liquidity comes back).
let gExclHalves = [];
const gBookVal = lv => lv.reduce((s, l) => s + l.p * l.q, 0);
// Persistent blacklist: once a half is PROVEN too thin, it stays excluded even
// after its cached books expire — no more "popping back up every 5 minutes as
// checking depth…". Its markets are silently re-probed in the background each
// cycle, and only fresh books proving real liquidity delete the entry.
const gBadHalves = new Map(); // key `${bridge}:${coin}:${out|ret}` -> { ts, mkts }
function gHalfViable(h, isOut, bridge) {
  const key = `${bridge}:${h.coin}:${isOut ? 'out' : 'ret'}`;
  const now = Date.now();
  const dInr = gDepth[h.ci.sym], dBr = gDepth[h.cb.sym];
  const freshInr = dInr && (now - dInr.ts) < G_TTL;
  const freshBr = dBr && (now - dBr.ts) < G_TTL;
  let bad = false;
  if (freshInr && gBookVal(gLv(isOut ? dInr.asks : dInr.bids)) < gSettings.minInr) bad = true;   // INR-market side
  if (!bad && freshBr && gBookVal(gLv(isOut ? dBr.bids : dBr.asks)) < gSettings.minUsdt) bad = true; // bridge side
  if (bad) { gBadHalves.set(key, { ts: now, mkts: [h.ci.sym, h.cb.sym] }); return false; }
  if (freshInr && freshBr) { gBadHalves.delete(key); return true; } // fully re-verified good
  if (gBadHalves.has(key)) return false; // proven bad before; books stale — stay out, re-probe runs in background
  return true; // genuinely unknown — innocent until probed
}

function gCounts() {
  if (gSnapLive()) return { intra: gServerSnap.aboveIntra || 0, cross: gServerSnap.aboveCross || 0 };
  if (!gLastRoutes) return { intra: 0, cross: 0 };
  const t = gSettings.thr;

}

async function gFetchDepth(m) {
  try {
    const res = await fetch(`/api/giottus/depth?market=${m}`);
    gCalls++;
    if (res.status === 429 || res.status >= 500) {
      gRlHits++; gBackoffUntil = Date.now() + gBackoffMs; gBackoffMs = Math.min(gBackoffMs * 2, 240000); return;
    }
    if (!res.ok) return;
    gBackoffMs = 15000;
    const d = await res.json();
    if (d && (d.asks || d.bids)) gDepth[m] = { asks: d.asks || [], bids: d.bids || [], ts: Date.now() };
  } catch (e) {}
}

// The server alert engine is the source of truth: it runs 24/7 (while any
// Giottus alert is enabled), so it has warm, persistence-checked verdicts the
// moment this page opens — no cold start. Shown at the top so the page can
// never say "0 tradeable" while an alert just fired.
async function gFetchSnapshot() {
  try {

    if (!res.ok) return;

async function gRefresh() {
  if (currentPage !== 'giottus' || gRefreshing) return;
  gRefreshing = true;
  try {
    // The 24/7 server engine is the PRIMARY source: it's already warm, so
    // results (with order books) show instantly. While its snapshot is live
    // this page makes ZERO Giottus calls of its own — the in-page scanner
    // below is only a fallback for when the engine is warming up or down.
    // (Polling the snapshot also acts as a keepalive that wakes the engine.)
    await gFetchSnapshot();
    if (gSnapLive()) { renderToolbar(); renderGiottusPage(); return; }
    const res = await fetch('/api/giottus/ticker');
    if (!res.ok) { let m = `API returned ${res.status}`; try { const b = await res.json(); if (b.error) m = b.error; } catch (e) {} throw new Error(m); }
    gTicker = await res.json(); gErr = null;
    gLastTs = new Date().toLocaleTimeString('en-US', { hour12: false });
    const maps = gMaps();
    gLastRoutes = gScreen(maps);
    renderToolbar(); renderGiottusPage();

    const thr = gSettings.thr;
    // Verify: above-threshold candidates PLUS the top-5 watchlist of each tab
    // (watchlist is depth-checked regardless of threshold). Active tab first.
    const seenQ = new Set();
    const queue = [];
    for (const c of [...gLastRoutes.filter(r => r.pct >= thr && gInTab(r)),
                     ...gLastRoutes.filter(r => gInTab(r)).slice(0, 5),
                     ...gLastRoutes.filter(r => r.pct >= thr && !gInTab(r)),
                     ...gLastRoutes.filter(r => !gInTab(r)).slice(0, 5)]) {
      if (seenQ.has(c.label)) continue;
      seenQ.add(c.label); queue.push(c);
    }
    const toCheck = [];
    for (const c of queue) {
      if (!gFreshCheck(gChecked.get(c.label), c.pct)) toCheck.push(c);
      if (toCheck.length >= G_PER_CYCLE) break;
    }
    gCalls = 0;
    // Background re-probe: blacklisted halves whose books have gone stale get
    // their markets silently re-fetched (max 4 halves/cycle) so they can
    // re-qualify without ever flashing back into the visible lists.
    const reprobe = new Set();
    let reprobes = 0;
    for (const [, info] of gBadHalves) {
      if (reprobes >= 4) break;
      if (info.mkts.some(m => { const d = gDepth[m]; return !d || (Date.now() - d.ts) >= G_TTL; })) {
        info.mkts.forEach(m => reprobe.add(m));
        reprobes++;
      }
    }
    if (Date.now() >= gBackoffUntil && (toCheck.length || reprobe.size)) {
      const btc = maps.usdt.get('btc');
      const btcPx = btc && (btc.bid || btc.ask);
      const mins = { inr: gSettings.minInr, usdt: gSettings.minUsdt, btc: btcPx ? gSettings.minUsdt / btcPx : 0 };
      const need = new Set(reprobe);
      for (const c of toCheck) for (const L of c.legsSpec) need.add(L.market);
      for (const m of need) {
        if (Date.now() < gBackoffUntil) break;
        const cc = gDepth[m];
        if (cc && Date.now() - cc.ts < 30000) continue;
        await gFetchDepth(m);
        await new Promise(r => setTimeout(r, G_SPACING));
      }
      for (const c of toCheck) {
        const legs = []; let ok = true;
        for (const L of c.legsSpec) {
          const d = gDepth[L.market];
          if (!d) { ok = false; break; }
          legs.push({ side: L.side, fee: L.fee, levels: gLv(L.side === 'buy' ? d.asks : d.bids) });
        }
        if (!ok) continue;
        const v = gVerdict(legs, c.legsSpec, mins);
        gChecked.set(c.label, { ts: Date.now(), walk: v.walk, forced: v.forced, scrPct: c.pct });
      }
      if (currentPage === 'giottus') { renderToolbar(); renderGiottusPage(); }
    }
  } catch (e) {
    gErr = e.message;
    if (currentPage === 'giottus') renderGiottusPage();
  } finally { gRefreshing = false; }
}

        <div class="g-fact"><div class="k">Trade size</div><div class="v">${gInrFmt(t.inrIn)}</div></div>
        <div class="g-fact"><div class="k">Net return</div><div class="v" style="color:var(--success);">${t.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Stable for</div><div class="v">${Math.floor(t.stableSec / 60)}m ${t.stableSec % 60}s</div></div>
      </div>
      <div class="kk-body" style="padding-top:0;">${legLines}</div>
      <div class="arb-bar">
        <div class="arb-label">Profit</div>
        <div class="arb-mid">
          <div class="arb-main">${gInrFmt(t.profit)} (${t.pct.toFixed(2)}%)</div>
          <div class="arb-sub">on ${gInrFmt(t.inrIn)} · after all fees & exchange minimums · verified ${t.checks}× in a row</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksSrv('st',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      <div class="gbook-slot" id="${gBookId('st', t.label)}">${open ? gSrvBooksHtml(t) : ''}</div>
    </div>`;
  }).join('') : `
    <div class="empty-state"><span class="emoji">🔬</span>No route clears ${gInrFmt(minP)} at real depth right now — same verdict your alerts run on.<br>
    <span style="font-size:12px; color:var(--gray-500);">The 24/7 engine re-checks every ${snap.pollSec || 15}s. Dislocations appear during volatile stretches — you'll get the alert the moment one holds.</span></div>`;

  // Show the MEASURED book value behind each "thin" verdict so it's verifiable
  // (coin · ₹ INR-book / USDT-book — vs the minimums), not just a bare label.
  const thinNote = (() => {
    const d = snap.thinDetail || [];
    if (d.length) {
      const minI = d[0].minInr ?? 1000, minU = d[0].minUsdt ?? 10;
      const show = d.slice(0, 6).map(t => {
        const br = (t.bridge || 'usdt').toUpperCase(); // which market the crypto side is priced in
        const inr = t.inr == null ? '—' : '₹' + Math.round(t.inr).toLocaleString('en-IN');
        const cv = t.usdt == null ? '—' : (+t.usdt).toPrecision(3) + ' ' + br;
        return `${(t.coin || '').toUpperCase()}·${br} (${inr} / ${cv})`;
      }).join(', ');
      return ` · <span style="color:var(--danger); font-weight:700;">${d.length} thin ${d.length === 1 ? 'coin' : 'coins'} benched</span> — measured book vs min ₹${minI} / ${minU} USDT (BTC-bridge min scaled to BTC): ${show}${d.length > 6 ? '…' : ''} · re-probed every 5 min`;
    }
    return (snap.thinCoins && snap.thinCoins.length)
      ? ` · <span style="color:var(--danger); font-weight:700;">${snap.thinCoins.length} thin ${snap.thinCoins.length === 1 ? 'coin' : 'coins'} disqualified</span>: ${snap.thinCoins.slice(0, 5).join(', ')}${snap.thinCoins.length > 5 ? '…' : ''} — re-probed every 5 min`
      : '';
  })();
  const glitchNote = (snap.badMkts && snap.badMkts.length)
    ? ` · <span style="color:var(--warning); font-weight:700;">${snap.badMkts.length} glitched ${snap.badMkts.length === 1 ? 'market' : 'markets'} ignored</span> (crossed bid ≥ ask): ${snap.badMkts.slice(0, 4).join(', ')}${snap.badMkts.length > 4 ? '…' : ''}`
    : '';
  const status = `
    <div class="g-status">
      24/7 alert engine · updated ${ago}s ago · checks every ${snap.pollSec || 15}s server-side · ${dust.length ? `${dust.length} verified below min profit · ` : ''}zero Giottus calls from this browser${thinNote}${glitchNote}
    </div>`;

  const watchHeader = `<div style="grid-column:1/-1;"><div class="sect" style="margin:4px 2px 8px;">Top 5 by screen % — always shown</div></div>`;
  const watchCards = gSrvWatch.map((t, i) => {
    const open = gOpenBooks.has('sw:' + t.label);
    const ok = t.status === 'ok', none = t.status === 'none';
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(t.label)}</div>
        <span class="badge" style="background:var(--gray-100); color:var(--gray-700);">#${i + 1} · screen ${t.scrPct.toFixed(2)}%</span>
      </div>
      <div class="arb-bar ${ok && t.profit > 0 ? '' : 'negative'}">
        <div class="arb-label">Depth</div>
        <div class="arb-mid">
          <div class="arb-main">${ok ? `${gInrFmt(t.profit)} (${t.pct.toFixed(2)}%)` : none ? 'No profitable size' : 'checking depth…'}</div>
          <div class="arb-sub">${ok ? `max profitable ${gInrFmt(t.inrIn)} · after fees & minimums` : none ? 'walked the real books — nothing placeable pays' : 'queued on the server (next few cycles)'}</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksSrv('sw',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      <div class="gbook-slot" id="${gBookId('sw', t.label)}">${open ? gSrvBooksHtml(t) : ''}</div>
    </div>`;
  }).join('');

  const settings = gSettingsOpen ? `
    <div class="g-settings" id="gSettingsCard">
      <div style="grid-column:1/-1; font-size:11.5px; color:var(--gray-500);">These settings drive the 24/7 engine and are saved on the server (they survive a restart). Set the fees to what you actually pay on Giottus — too low and it will surface trades that aren't really profitable. Min profit ₹ additionally filters this page's display. Changes apply on the engine's next check (~15s).</div>
      <label>Min profit ₹<input id="gMinP" type="number" step="10" value="${gSettings.minP}" onchange="gApplySettings()"></label>
      <label>INR-market fee %<input id="gFeeInr" type="number" step="0.05" value="${gSettings.feeInr}" onchange="gApplySettings()"></label>
      <label>Crypto-market fee %<input id="gFeeUsdt" type="number" step="0.05" value="${gSettings.feeUsdt}" onchange="gApplySettings()"></label>
      <label>Screen threshold %<input id="gThr" type="number" step="0.1" value="${gSettings.thr}" onchange="gApplySettings()"></label>
      <label>Exchange min (INR mkt) ₹<input id="gMinInr" type="number" step="100" value="${gSettings.minInr}" onchange="gApplySettings()"></label>
      <label>Exchange min (crypto mkt) USDT<input id="gMinUsdt" type="number" step="1" value="${gSettings.minUsdt}" onchange="gApplySettings()"></label>
      <label>Top triangles per side (cross pairing)<input id="gTopK" type="number" step="1" value="${gSettings.topK}" onchange="gApplySettings()"></label>
    </div>` : '';

  list0.innerHTML = `${stats}${settings}${cards}${status}${gSrvWatch.length ? watchHeader + watchCards : ''}`;
}

function renderGiottusPage() {
  const list0 = document.getElementById('cardList');
  if (!list0 || currentPage !== 'giottus') return;
  // don't clobber the settings form while the user is typing in it
  if (document.activeElement && document.activeElement.closest && document.activeElement.closest('#gSettingsCard')) return;

  // Primary: the 24/7 server engine's live snapshot (instant, with books).
  if (gSnapLive()) { renderGiottusServerView(list0); return; }

  if (!gTicker) {
    const wake = gServerSnap && !gServerSnap.enabled
      ? `<div class="note-box" style="margin-top:10px;">The 24/7 engine is waking up (it sleeps when no Giottus alert is enabled and this tab is closed) — first results in ~15–30s.</div>` : '';
    list0.innerHTML = (gErr
      ? `<div class="banner-error">Couldn't reach Giottus (${gErr}). Retrying every 10s. Note: this page only works on the deployed site, not from a local file.</div>`
      : `<div class="empty-state"><span class="emoji">📡</span>Connecting to Giottus…</div>`) + wake;
    return;
  }

  const thr = gSettings.thr, minP = gSettings.minP;
  const routesAll = gLastRoutes || [];
  const aboveThr = routesAll.filter(r => r.pct >= thr && gInTab(r));
  const tradeable = [], dust = []; let pending = 0;
  for (const c of aboveThr) {
    const e = gChecked.get(c.label);
    if (!gFreshCheck(e, c.pct)) { pending++; continue; }
    if (e.walk && e.walk !== 'none' && e.walk.profit >= minP) { c.walk = e.walk; c.walkUsed = e.walk.used; c.forced = e.forced; tradeable.push(c); }
    else dust.push(e.walk && e.walk !== 'none' ? e.walk.profit : 0);
  }
  tradeable.sort((a, b) => b.walk.profit - a.walk.profit);
  gCandidates = tradeable.slice(0, 20);
  const bestPctIdx = gCandidates.reduce((bi, c, i) => (c.walk.pct > (gCandidates[bi] ? gCandidates[bi].walk.pct : -Infinity) ? i : bi), 0);
  const checked = dust.length + tradeable.length;
  const prog = aboveThr.length ? Math.round(checked / aboveThr.length * 100) : 100;
  const bestDust = dust.reduce((m, p) => Math.max(m, p), 0);

  const stats = `
    <div class="g-stats">
      <div class="g-stat"><div class="k">Tradeable now</div><div class="v ${tradeable.length ? 'good' : ''}">${tradeable.length}</div><div class="sub">≥ ${gInrFmt(minP)} after fees & minimums</div></div>
      <div class="g-stat"><div class="k">Above threshold</div><div class="v">${aboveThr.length}</div><div class="sub">of ${routesAll.length.toLocaleString('en-IN')} routes screened</div></div>
      <div class="g-stat"><div class="k">USDT/INR on Giottus</div><div class="v mid">${gUiRate}</div><div class="sub">bid / ask</div></div>
      <div class="g-stat"><div class="k">Markets</div><div class="v">${gMkts}</div><div class="sub">one ticker call each cycle</div></div>
    </div>`;

  const settings = gSettingsOpen ? `
    <div class="g-settings" id="gSettingsCard">
      <label>INR-market fee %<input id="gFeeInr" type="number" step="0.05" value="${gSettings.feeInr}" onchange="gApplySettings()"></label>
      <label>Crypto-market fee %<input id="gFeeUsdt" type="number" step="0.05" value="${gSettings.feeUsdt}" onchange="gApplySettings()"></label>
      <label>Screen threshold %<input id="gThr" type="number" step="0.1" value="${gSettings.thr}" onchange="gApplySettings()"></label>
      <label>Min profit ₹<input id="gMinP" type="number" step="10" value="${gSettings.minP}" onchange="gApplySettings()"></label>
      <label>Exchange min (INR mkt) ₹<input id="gMinInr" type="number" step="100" value="${gSettings.minInr}" onchange="gApplySettings()"></label>
      <label>Exchange min (crypto mkt) USDT<input id="gMinUsdt" type="number" step="1" value="${gSettings.minUsdt}" onchange="gApplySettings()"></label>
      <label>Top triangles per side (cross pairing)<input id="gTopK" type="number" step="1" value="${gSettings.topK}" onchange="gApplySettings()"></label>
    </div>` : '';

  const cards = gCandidates.length ? gCandidates.map((c, i) => {
    const w = c.walk;
    const open = gOpenBooks.has('c:' + c.label);
    const tags = `${i === 0 ? '<span class="g-tag gold">highest profit</span>' : ''}
                  ${i === bestPctIdx ? '<span class="g-tag blue">best %</span>' : ''}
                  ${c.forced ? '<span class="g-tag purple">sized to exchange min</span>' : ''}`;
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(c.label)}</div>
        <div class="badge-row" style="gap:4px;">${tags}</div>
      </div>
      <div class="g-facts">
        <div class="g-fact"><div class="k">Screen</div><div class="v">${c.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Trade size</div><div class="v">${gInrFmt(w.inrIn)}</div></div>
        <div class="g-fact"><div class="k">Net return</div><div class="v" style="color:var(--success);">${w.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Legs</div><div class="v">${c.legsSpec.length} trades</div></div>
      </div>
      ${c.deriv ? `<div class="g-facts" style="padding-top:0;">
        <div class="g-fact"><div class="k">${c.deriv.outCoin} triangle alone</div><div class="v" style="color:${c.deriv.outTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.outTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">${c.deriv.retCoin} triangle alone</div><div class="v" style="color:${c.deriv.retTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.retTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">USDT/INR toll recovered</div><div class="v" style="color:var(--accent);">+${c.deriv.spread.toFixed(2)}%</div></div>
      </div>` : ''}
      <div class="arb-bar">
        <div class="arb-label">Profit</div>
        <div class="arb-mid">
          <div class="arb-main">${gInrFmt(w.profit)} (${w.pct.toFixed(2)}%)</div>
          <div class="arb-sub">on ${gInrFmt(w.inrIn)} · after all fees & exchange minimums</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksL('c',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gBooksHtml(c) : ''}
    </div>`;
  }).join('') : `
    <div class="empty-state"><span class="emoji">🔬</span>No route clears ${gInrFmt(minP)} at real depth right now${pending ? ' — still checking the queue below' : ''}.<br>
    <span style="font-size:12px; color:var(--gray-500);">Giottus is fairly priced this minute. This updates every 10s; dislocations appear during volatile stretches.</span></div>`;

  const exclNames = [...new Set(gExclHalves.map(x => x.coin))];
  const exclNote = exclNames.length
    ? ` · <span style="color:var(--danger); font-weight:700;">${exclNames.length} thin ${exclNames.length === 1 ? 'coin' : 'coins'} disqualified</span> (books can't hold the exchange minimum): ${exclNames.slice(0, 5).join(', ')}${exclNames.length > 5 ? '…' : ''} — re-probed every 5 min`
    : '';
  const glitchNote = gBadMkts.length
    ? ` · <span style="color:var(--warning); font-weight:700;">${gBadMkts.length} glitched ${gBadMkts.length === 1 ? 'market' : 'markets'} ignored</span> (crossed bid ≥ ask — fake spread): ${gBadMkts.slice(0, 4).join(', ')}${gBadMkts.length > 4 ? '…' : ''}`
    : '';
  const status = `
    <div class="g-status">
      ${checked} of ${aboveThr.length} candidates verified · ${dust.length} below min profit${dust.length ? ` (best ${gInrFmt(bestDust)})` : ''} · ${pending} queued (${G_PER_CYCLE}/cycle) · verdicts refresh every 5 min${exclNote}${glitchNote}
      <div class="g-progress"><div style="width:${prog}%"></div></div>
    </div>`;

  // Top-5 watchlist: the best 5 routes of this tab by screen %, shown ALWAYS
  // (regardless of threshold or min profit), depth-checked with books — so
  // the best of the market is inspectable even when nothing is tradeable.
  gWatch = routesAll.filter(r => gInTab(r)).slice(0, 5);
  const watchHeader = `<div style="grid-column:1/-1;"><div class="sect" style="margin:4px 2px 8px;">Top 5 by screen % — always shown</div></div>`;
  const watchCards = gWatch.map((c, i) => {
    const e = gChecked.get(c.label);
    const fresh = gFreshCheck(e, c.pct);
    const w = fresh && e.walk && e.walk !== 'none' ? e.walk : null;
    const none = fresh && e.walk === 'none';
    if (w) { c.walkUsed = e.walk.used; }
    const open = gOpenBooks.has('w:' + c.label);
    const good = w && w.profit > 0;
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(c.label)}</div>
        <span class="badge" style="background:var(--gray-100); color:var(--gray-700);">#${i + 1} · screen ${c.pct.toFixed(2)}%</span>
      </div>
      ${c.deriv ? `<div class="g-facts">
        <div class="g-fact"><div class="k">${c.deriv.outCoin} triangle</div><div class="v" style="color:${c.deriv.outTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.outTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">${c.deriv.retCoin} triangle</div><div class="v" style="color:${c.deriv.retTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.retTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Toll recovered</div><div class="v" style="color:var(--accent);">+${c.deriv.spread.toFixed(2)}%</div></div>
      </div>` : ''}
      <div class="arb-bar ${good ? '' : 'negative'}">
        <div class="arb-label">Depth</div>
        <div class="arb-mid">
          <div class="arb-main">${w ? `${gInrFmt(w.profit)} (${w.pct.toFixed(2)}%)` : none ? 'No profitable size' : 'checking depth…'}</div>
          <div class="arb-sub">${w ? `max profitable ${gInrFmt(w.inrIn)} · after fees & minimums` : none ? 'walked the real books — nothing placeable pays' : 'queued for verification'}</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksL('w',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gBooksHtml(c) : ''}
    </div>`;
  }).join('');
  const missCard = gWatch.length ? watchHeader + watchCards : '';

  list0.innerHTML = `
    ${gErr ? `<div class="banner-error">Couldn't reach Giottus (${gErr}) — showing the last data.</div>` : ''}
    <div class="note-box" style="margin-bottom:10px;">Fallback scanner (runs in this browser) — the 24/7 engine isn't reachable right now; it takes over automatically once it responds.</div>
    ${stats}
    ${settings}
    ${cards}
    ${status}
    ${missCard}`;
}

// Restore the page + filters the user last had, so a full page reload
// (browser refresh / mobile pull-to-refresh) keeps them where they were
// instead of snapping back to Direct with cleared filters.
buildVenueNav(); // inject the Zebpay/CoinDCX exchange tabs before restoring the page
selectPage(loadUiState() || 'wazirx');
fullRefresh().finally(prefetchOtherVolume); // warm the other volume so the first toggle is instant
setInterval(fullRefresh, 10000);
setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  updateRefreshStatus();
}, 1000);

// ---- Split-screen / foldable touch-offset fix ----
// Some Android browsers (notably on foldables entering multi-window) don't
// refresh their touch hit-test map after the window is resized, so taps land
// offset from what's drawn. Forcing a synchronous reflow on every viewport
// change rebuilds that map. We nudge the scroll by a pixel and read layout,
// which reliably invalidates the stale hit regions without any visible jump.
let __reflowT = null;
function kickTouchReflow() {
  // Coalesce bursts of resize events into one reflow.
  if (__reflowT) return;
  __reflowT = setTimeout(() => {
    __reflowT = null;
    const y = window.scrollY || 0;
    document.body.style.minHeight = window.innerHeight + 'px';
    void document.body.offsetHeight;          // force synchronous layout
    document.body.style.minHeight = '';
    window.scrollTo(0, y + 1); window.scrollTo(0, y); // re-seat the hit-test map
  }, 60);
}
window.addEventListener('resize', kickTouchReflow);
window.addEventListener('orientationchange', () => setTimeout(kickTouchReflow, 120));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', kickTouchReflow);
}
</script>
