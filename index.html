                  ${t.forced ? '<span class="g-tag purple">sized to exchange min</span>' : ''}`;
    const legLines = (t.legs || []).map((L, j) => {
      const val = L.quote === 'inr' ? gInrFmt(L.value) : `${(+L.value).toFixed(2)} ${L.quote.toUpperCase()}`;
      return `<div class="leg-line"><span class="k">(${j + 1}) ${L.side === 'buy' ? 'BUY' : 'SELL'} ${gLegTitle(L)}</span><span class="v">${val}</span></div>`;
    }).join('');
    return `
    <div class="card" style="border-left:3px solid var(--success);">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(t.label)}</div>
        <div class="badge-row" style="gap:4px;">${tags}</div>
      </div>
      <div class="g-facts">
        <div class="g-fact"><div class="k">Screen</div><div class="v">${t.scrPct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Trade size</div><div class="v">${gInrFmt(t.inrIn)}</div></div>
        <div class="g-fact"><div class="k">Net return</div><div class="v" style="color:var(--success);">${t.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Stable for</div><div class="v">${Math.floor(t.stableSec / 60)}m ${t.stableSec % 60}s</div></div>
      </div>
      <div class="kk-body" style="padding-top:0;">${legLines}</div>
      <div class="arb-bar">
        <div class="arb-label">Profit</div>
        <div class="arb-mid">
          <div class="arb-main">${gInrFmt(t.profit)} (${t.pct.toFixed(2)}%)</div>
          <div class="arb-sub">on ${gInrFmt(t.inrIn)} · after all fees & exchange minimums · verified ${t.checks}× in a row</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksSrv('st',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gSrvBooksHtml(t) : ''}
    </div>`;
  }).join('') : `
    <div class="empty-state"><span class="emoji">🔬</span>No route clears ${gInrFmt(minP)} at real depth right now — same verdict your alerts run on.<br>
    <span style="font-size:12px; color:var(--gray-500);">The 24/7 engine re-checks every ${snap.pollSec || 15}s. Dislocations appear during volatile stretches — you'll get the alert the moment one holds.</span></div>`;

  const thinNote = (snap.thinCoins && snap.thinCoins.length)
    ? ` · <span style="color:var(--danger); font-weight:700;">${snap.thinCoins.length} thin ${snap.thinCoins.length === 1 ? 'coin' : 'coins'} disqualified</span>: ${snap.thinCoins.slice(0, 5).join(', ')}${snap.thinCoins.length > 5 ? '…' : ''} — re-probed every 5 min`
    : '';
  const glitchNote = (snap.badMkts && snap.badMkts.length)
    ? ` · <span style="color:var(--warning); font-weight:700;">${snap.badMkts.length} glitched ${snap.badMkts.length === 1 ? 'market' : 'markets'} ignored</span> (crossed bid ≥ ask): ${snap.badMkts.slice(0, 4).join(', ')}${snap.badMkts.length > 4 ? '…' : ''}`
    : '';
  const status = `
    <div class="g-status">
      24/7 alert engine · updated ${ago}s ago · checks every ${snap.pollSec || 15}s server-side · ${dust.length ? `${dust.length} verified below min profit · ` : ''}zero Giottus calls from this browser${thinNote}${glitchNote}
    </div>`;

  const watchHeader = `<div style="grid-column:1/-1;"><div class="sect" style="margin:4px 2px 8px;">Top 5 by screen % — always shown</div></div>`;
  const watchCards = gSrvWatch.map((t, i) => {
    const open = gOpenBooks.has('sw:' + t.label);
    const ok = t.status === 'ok', none = t.status === 'none';
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(t.label)}</div>
        <span class="badge" style="background:var(--gray-100); color:var(--gray-700);">#${i + 1} · screen ${t.scrPct.toFixed(2)}%</span>
      </div>
      <div class="arb-bar ${ok && t.profit > 0 ? '' : 'negative'}">
        <div class="arb-label">Depth</div>
        <div class="arb-mid">
          <div class="arb-main">${ok ? `${gInrFmt(t.profit)} (${t.pct.toFixed(2)}%)` : none ? 'No profitable size' : 'checking depth…'}</div>
          <div class="arb-sub">${ok ? `max profitable ${gInrFmt(t.inrIn)} · after fees & minimums` : none ? 'walked the real books — nothing placeable pays' : 'queued on the server (next few cycles)'}</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksSrv('sw',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gSrvBooksHtml(t) : ''}
    </div>`;
  }).join('');

  const settings = gSettingsOpen ? `
    <div class="g-settings" id="gSettingsCard">
      <div style="grid-column:1/-1; font-size:11.5px; color:var(--gray-500);">Min profit ₹ filters this page. The other values apply to the in-page fallback scanner — the 24/7 engine uses the server's settings.</div>
      <label>Min profit ₹<input id="gMinP" type="number" step="10" value="${gSettings.minP}" onchange="gApplySettings()"></label>
      <label>INR-market fee %<input id="gFeeInr" type="number" step="0.05" value="${gSettings.feeInr}" onchange="gApplySettings()"></label>
      <label>Crypto-market fee %<input id="gFeeUsdt" type="number" step="0.05" value="${gSettings.feeUsdt}" onchange="gApplySettings()"></label>
      <label>Screen threshold %<input id="gThr" type="number" step="0.1" value="${gSettings.thr}" onchange="gApplySettings()"></label>
      <label>Exchange min (INR mkt) ₹<input id="gMinInr" type="number" step="100" value="${gSettings.minInr}" onchange="gApplySettings()"></label>
      <label>Exchange min (crypto mkt) USDT<input id="gMinUsdt" type="number" step="1" value="${gSettings.minUsdt}" onchange="gApplySettings()"></label>
      <label>Top triangles per side (cross pairing)<input id="gTopK" type="number" step="1" value="${gSettings.topK}" onchange="gApplySettings()"></label>
    </div>` : '';

  list0.innerHTML = `${stats}${settings}${cards}${status}${gSrvWatch.length ? watchHeader + watchCards : ''}`;
}

function renderGiottusPage() {
  const list0 = document.getElementById('cardList');
  if (!list0 || currentPage !== 'giottus') return;
  // don't clobber the settings form while the user is typing in it
  if (document.activeElement && document.activeElement.closest && document.activeElement.closest('#gSettingsCard')) return;

  // Primary: the 24/7 server engine's live snapshot (instant, with books).
  if (gSnapLive()) { renderGiottusServerView(list0); return; }

  if (!gTicker) {
    const wake = gServerSnap && !gServerSnap.enabled
      ? `<div class="note-box" style="margin-top:10px;">The 24/7 engine is waking up (it sleeps when no Giottus alert is enabled and this tab is closed) — first results in ~15–30s.</div>` : '';
    list0.innerHTML = (gErr
      ? `<div class="banner-error">Couldn't reach Giottus (${gErr}). Retrying every 10s. Note: this page only works on the deployed site, not from a local file.</div>`
      : `<div class="empty-state"><span class="emoji">📡</span>Connecting to Giottus…</div>`) + wake;
    return;
  }

  const thr = gSettings.thr, minP = gSettings.minP;
  const routesAll = gLastRoutes || [];
  const aboveThr = routesAll.filter(r => r.pct >= thr && gInTab(r));
  const tradeable = [], dust = []; let pending = 0;
  for (const c of aboveThr) {
    const e = gChecked.get(c.label);
    if (!gFreshCheck(e, c.pct)) { pending++; continue; }
    if (e.walk && e.walk !== 'none' && e.walk.profit >= minP) { c.walk = e.walk; c.walkUsed = e.walk.used; c.forced = e.forced; tradeable.push(c); }
    else dust.push(e.walk && e.walk !== 'none' ? e.walk.profit : 0);
  }
  tradeable.sort((a, b) => b.walk.profit - a.walk.profit);
  gCandidates = tradeable.slice(0, 20);
  const bestPctIdx = gCandidates.reduce((bi, c, i) => (c.walk.pct > (gCandidates[bi] ? gCandidates[bi].walk.pct : -Infinity) ? i : bi), 0);
  const checked = dust.length + tradeable.length;
  const prog = aboveThr.length ? Math.round(checked / aboveThr.length * 100) : 100;
  const bestDust = dust.reduce((m, p) => Math.max(m, p), 0);

  const stats = `
    <div class="g-stats">
      <div class="g-stat"><div class="k">Tradeable now</div><div class="v ${tradeable.length ? 'good' : ''}">${tradeable.length}</div><div class="sub">≥ ${gInrFmt(minP)} after fees & minimums</div></div>
      <div class="g-stat"><div class="k">Above threshold</div><div class="v">${aboveThr.length}</div><div class="sub">of ${routesAll.length.toLocaleString('en-IN')} routes screened</div></div>
      <div class="g-stat"><div class="k">USDT/INR on Giottus</div><div class="v mid">${gUiRate}</div><div class="sub">bid / ask</div></div>
      <div class="g-stat"><div class="k">Markets</div><div class="v">${gMkts}</div><div class="sub">one ticker call each cycle</div></div>
    </div>`;

  const settings = gSettingsOpen ? `
    <div class="g-settings" id="gSettingsCard">
      <label>INR-market fee %<input id="gFeeInr" type="number" step="0.05" value="${gSettings.feeInr}" onchange="gApplySettings()"></label>
      <label>Crypto-market fee %<input id="gFeeUsdt" type="number" step="0.05" value="${gSettings.feeUsdt}" onchange="gApplySettings()"></label>
      <label>Screen threshold %<input id="gThr" type="number" step="0.1" value="${gSettings.thr}" onchange="gApplySettings()"></label>
      <label>Min profit ₹<input id="gMinP" type="number" step="10" value="${gSettings.minP}" onchange="gApplySettings()"></label>
      <label>Exchange min (INR mkt) ₹<input id="gMinInr" type="number" step="100" value="${gSettings.minInr}" onchange="gApplySettings()"></label>
      <label>Exchange min (crypto mkt) USDT<input id="gMinUsdt" type="number" step="1" value="${gSettings.minUsdt}" onchange="gApplySettings()"></label>
      <label>Top triangles per side (cross pairing)<input id="gTopK" type="number" step="1" value="${gSettings.topK}" onchange="gApplySettings()"></label>
    </div>` : '';

  const cards = gCandidates.length ? gCandidates.map((c, i) => {
    const w = c.walk;
    const open = gOpenBooks.has('c:' + c.label);
    const tags = `${i === 0 ? '<span class="g-tag gold">highest profit</span>' : ''}
                  ${i === bestPctIdx ? '<span class="g-tag blue">best %</span>' : ''}
                  ${c.forced ? '<span class="g-tag purple">sized to exchange min</span>' : ''}`;
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(c.label)}</div>
        <div class="badge-row" style="gap:4px;">${tags}</div>
      </div>
      <div class="g-facts">
        <div class="g-fact"><div class="k">Screen</div><div class="v">${c.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Trade size</div><div class="v">${gInrFmt(w.inrIn)}</div></div>
        <div class="g-fact"><div class="k">Net return</div><div class="v" style="color:var(--success);">${w.pct.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Legs</div><div class="v">${c.legsSpec.length} trades</div></div>
      </div>
      ${c.deriv ? `<div class="g-facts" style="padding-top:0;">
        <div class="g-fact"><div class="k">${c.deriv.outCoin} triangle alone</div><div class="v" style="color:${c.deriv.outTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.outTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">${c.deriv.retCoin} triangle alone</div><div class="v" style="color:${c.deriv.retTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.retTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">USDT/INR toll recovered</div><div class="v" style="color:var(--accent);">+${c.deriv.spread.toFixed(2)}%</div></div>
      </div>` : ''}
      <div class="arb-bar">
        <div class="arb-label">Profit</div>
        <div class="arb-mid">
          <div class="arb-main">${gInrFmt(w.profit)} (${w.pct.toFixed(2)}%)</div>
          <div class="arb-sub">on ${gInrFmt(w.inrIn)} · after all fees & exchange minimums</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksL('c',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gBooksHtml(c) : ''}
    </div>`;
  }).join('') : `
    <div class="empty-state"><span class="emoji">🔬</span>No route clears ${gInrFmt(minP)} at real depth right now${pending ? ' — still checking the queue below' : ''}.<br>
    <span style="font-size:12px; color:var(--gray-500);">Giottus is fairly priced this minute. This updates every 10s; dislocations appear during volatile stretches.</span></div>`;

  const exclNames = [...new Set(gExclHalves.map(x => x.coin))];
  const exclNote = exclNames.length
    ? ` · <span style="color:var(--danger); font-weight:700;">${exclNames.length} thin ${exclNames.length === 1 ? 'coin' : 'coins'} disqualified</span> (books can't hold the exchange minimum): ${exclNames.slice(0, 5).join(', ')}${exclNames.length > 5 ? '…' : ''} — re-probed every 5 min`
    : '';
  const glitchNote = gBadMkts.length
    ? ` · <span style="color:var(--warning); font-weight:700;">${gBadMkts.length} glitched ${gBadMkts.length === 1 ? 'market' : 'markets'} ignored</span> (crossed bid ≥ ask — fake spread): ${gBadMkts.slice(0, 4).join(', ')}${gBadMkts.length > 4 ? '…' : ''}`
    : '';
  const status = `
    <div class="g-status">
      ${checked} of ${aboveThr.length} candidates verified · ${dust.length} below min profit${dust.length ? ` (best ${gInrFmt(bestDust)})` : ''} · ${pending} queued (${G_PER_CYCLE}/cycle) · verdicts refresh every 5 min${exclNote}${glitchNote}
      <div class="g-progress"><div style="width:${prog}%"></div></div>
    </div>`;

  // Top-5 watchlist: the best 5 routes of this tab by screen %, shown ALWAYS
  // (regardless of threshold or min profit), depth-checked with books — so
  // the best of the market is inspectable even when nothing is tradeable.
  gWatch = routesAll.filter(r => gInTab(r)).slice(0, 5);
  const watchHeader = `<div style="grid-column:1/-1;"><div class="sect" style="margin:4px 2px 8px;">Top 5 by screen % — always shown</div></div>`;
  const watchCards = gWatch.map((c, i) => {
    const e = gChecked.get(c.label);
    const fresh = gFreshCheck(e, c.pct);
    const w = fresh && e.walk && e.walk !== 'none' ? e.walk : null;
    const none = fresh && e.walk === 'none';
    if (w) { c.walkUsed = e.walk.used; }
    const open = gOpenBooks.has('w:' + c.label);
    const good = w && w.profit > 0;
    return `
    <div class="card">
      <div class="card-top" style="flex-wrap:wrap; gap:6px;">
        <div class="g-route">${gRouteChips(c.label)}</div>
        <span class="badge" style="background:var(--gray-100); color:var(--gray-700);">#${i + 1} · screen ${c.pct.toFixed(2)}%</span>
      </div>
      ${c.deriv ? `<div class="g-facts">
        <div class="g-fact"><div class="k">${c.deriv.outCoin} triangle</div><div class="v" style="color:${c.deriv.outTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.outTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">${c.deriv.retCoin} triangle</div><div class="v" style="color:${c.deriv.retTri >= 0 ? 'var(--success)' : 'var(--danger)'};">${c.deriv.retTri.toFixed(2)}%</div></div>
        <div class="g-fact"><div class="k">Toll recovered</div><div class="v" style="color:var(--accent);">+${c.deriv.spread.toFixed(2)}%</div></div>
      </div>` : ''}
      <div class="arb-bar ${good ? '' : 'negative'}">
        <div class="arb-label">Depth</div>
        <div class="arb-mid">
          <div class="arb-main">${w ? `${gInrFmt(w.profit)} (${w.pct.toFixed(2)}%)` : none ? 'No profitable size' : 'checking depth…'}</div>
          <div class="arb-sub">${w ? `max profitable ${gInrFmt(w.inrIn)} · after fees & minimums` : none ? 'walked the real books — nothing placeable pays' : 'queued for verification'}</div>
        </div>
        <button class="track-live-btn" onclick="gToggleBooksL('w',${i})">${open ? '▲ Hide books' : '◉ Books'}</button>
      </div>
      ${open ? gBooksHtml(c) : ''}
    </div>`;
  }).join('');
  const missCard = gWatch.length ? watchHeader + watchCards : '';

  list0.innerHTML = `
    ${gErr ? `<div class="banner-error">Couldn't reach Giottus (${gErr}) — showing the last data.</div>` : ''}
    <div class="note-box" style="margin-bottom:10px;">Fallback scanner (runs in this browser) — the 24/7 engine isn't reachable right now; it takes over automatically once it responds.</div>
    ${stats}
    ${settings}
    ${cards}
    ${status}
    ${missCard}`;
}

// Restore the page + filters the user last had, so a full page reload
// (browser refresh / mobile pull-to-refresh) keeps them where they were
// instead of snapping back to Direct with cleared filters.
selectPage(loadUiState() || 'direct');
fullRefresh();
setInterval(fullRefresh, 10000);
setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  document.getElementById('nextRefresh').textContent = `Next auto-refresh in ${countdown}s`;
}, 1000);
</script>
</body>
</html>
